<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
</head>

<body>
    <div id="weather-container">
        <!-- Weather app content will be dynamically inserted here -->
        <form>
            <input id="city-input" type="text" name="city" placeholder="Enter city name" required>
            <button id="search-button" type="submit">Get Weather</button>
        </form>
        <button id="unit-toggle">Switch to °F</button>
        <div id="loading" style="display: none;">Loading...</div>
        <div id="weather-info"></div>
    </div>
</body>

</html>
